<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaquinha - Take Your Time</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Anton&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Anton', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
        }

        .bg-pc-blur {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('fundo.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(15px) brightness(0.4);
            z-index: 0;
        }

        @media (min-width: 768px) {
            .bg-pc-blur {
                display: block;
            }
        }

        .app-container {
            position: relative;
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background-color: #111;
            background-image: url('fundo.jpg');
            background-size: 100% auto;
            background-repeat: no-repeat;
            background-position: top center;
            z-index: 1;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.9);
            overflow: hidden;
        }

        /* DIALOGUE BOX WITH HIGH VISIBILITY */
        .dialogue-container {
            position: absolute;
            top: 10%; 
            left: 12%;
            width: 76%;
            height: 12%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: rotate(-6deg);
            z-index: 9999;
            pointer-events: none;
        }

        .dialogue-title {
            font-family: 'Permanent Marker', cursive;
            font-size: 24px;
            color: #ffffff !important;
            text-shadow: 3px 3px 6px rgba(230, 0, 18, 1);
            text-align: center;
            line-height: 1.1;
            text-transform: uppercase;
            width: 100%;
            word-wrap: break-word;
        }

        .spacer {
            width: 100%;
            padding-top: 130%; 
        }

        .content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            position: relative;
            z-index: 10;
        }

        .p5-panel {
            background: #e60012; 
            border: 4px solid #fff;
            padding: 15px;
            transform: skewX(-5deg);
            position: relative;
            box-shadow: 8px 8px 0px #000;
        }

        .p5-panel-inner {
            transform: skewX(5deg);
            text-align: center;
        }

        .p5-label {
            font-family: 'Anton', sans-serif;
            background: #000;
            color: #fff;
            display: inline-block;
            padding: 4px 12px;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            transform: rotate(-2deg);
        }

        .pix-key {
            background: #fff;
            color: #000;
            font-size: 16px;
            padding: 10px;
            border: 3px solid #000;
            word-break: break-all;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 10px;
        }

        .stat-box {
            background: #fff;
            border: 4px solid #000;
            padding: 15px 10px;
            position: relative;
            transform: skewX(3deg);
            box-shadow: -5px 5px 0px #e60012;
        }

        .stat-box.meta-box {
            background: #000;
            color: #fff;
            border-color: #fff;
            box-shadow: -5px 5px 0px #e60012;
        }

        .stat-box-inner {
            transform: skewX(-3deg);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-box .label {
            font-size: 12px;
            color: #e60012;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 5px;
            background: #000;
            padding: 2px 5px;
        }

        .stat-box.meta-box .label {
            color: #000;
            background: #fff;
        }

        .stat-box .value {
            font-size: 22px;
            letter-spacing: 1px;
        }

        .icon-joker {
            position: absolute;
            top: -45px;
            right: -25px;
            width: 80px;
            height: 80px;
            background-image: url('joker.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            z-index: 10;
        }

        /* JACK FROST ICON BACK TO EXTERNAL PNG FILE WITH FIXED POSITIONING */
        .icon-frost {
            position: absolute;
            top: -45px;
            left: -20px;
            width: 75px;
            height: 75px;
            z-index: 10;
            background-image: url('jack_frost.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
        }

        .progress-wrapper {
            background: #000;
            border: 3px solid #fff;
            padding: 5px;
            transform: rotate(-1deg);
            position: relative;
        }

        .progress-bar-bg {
            background: #222;
            height: 30px;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            background: repeating-linear-gradient(
                -45deg,
                #e60012,
                #e60012 10px,
                #b3000e 10px,
                #b3000e 20px
            );
            height: 100%;
            width: 0%;
            transition: width 0.8s ease-in-out;
        }

        .progress-text {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
            text-shadow: 2px 2px 0 #000;
            z-index: 2;
        }
    </style>
</head>
<body>

<div class="bg-pc-blur"></div>

<div class="app-container">
    
    <div class="dialogue-container">
        <div class="dialogue-title" id="view-title">CARREGANDO...</div>
    </div>

    <div class="spacer"></div>

    <div class="content">
        <div class="p5-panel">
            <div class="p5-panel-inner">
                <div class="p5-label">CHAVE PIX</div>
                <div class="pix-key" id="view-pix">...</div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="icon-frost"></div>
                <div class="stat-box-inner">
                    <span class="label">ARRECADADO</span>
                    <span class="value" style="color: #000;" id="val-arrecadado">R$ 0,00</span>
                </div>
            </div>

            <div class="stat-box meta-box">
                <div class="icon-joker"></div>
                <div class="stat-box-inner">
                    <span class="label">META TOTAL</span>
                    <span class="value" id="val-meta">R$ 0,00</span>
                </div>
            </div>
        </div>

        <div class="progress-wrapper">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="bar-fill"></div>
                <div class="progress-text" id="bar-pct">0%</div>
            </div>
        </div>
    </div>
</div>

<script>
    // Força a limpeza da memória local antiga para aplicar os dados novos que você digitar abaixo
    localStorage.clear();

    function updateUI() {
        // Altere os valores diretamente aqui para atualizar o site de todo mundo:
        let campaign = {
            title: "Me ajude a comprar p5r (Persona 5 Royal)", // Digite o Título aqui
            pix: "italogabriel25112007@gmail.com",             // Digite seu PIX aqui
            meta: 75.00,                                       // Digite o valor total da Meta aqui
            arrecadado: 20.00                                  // Digite o quanto você já ganhou aqui
        };

        document.getElementById('view-title').innerText = campaign.title.toUpperCase();
        document.getElementById('view-pix').innerText = campaign.pix;
        
        document.getElementById('val-arrecadado').innerText = `R$ ${campaign.arrecadado.toFixed(2).replace('.', ',')}`;
        document.getElementById('val-meta').innerText = `R$ ${campaign.meta.toFixed(2).replace('.', ',')}`;

        let pct = Math.floor((campaign.arrecadado / campaign.meta) * 100);
        if (pct > 100) pct = 100;
        if (isNaN(pct)) pct = 0;

        document.getElementById('bar-fill').style.width = `${pct}%`;
        document.getElementById('bar-pct').innerText = `${pct}% CONCLUÍDO`;
    }

    updateUI();
</script>
</body>
</html>
