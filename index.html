<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaquinha - Take Your Time</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Anton&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Anton', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
        }

        .bg-pc-blur {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('fundo.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(15px) brightness(0.4);
            z-index: 0;
        }

        @media (min-width: 768px) {
            .bg-pc-blur {
                display: block;
            }
        }

        .app-container {
            position: relative;
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background-color: #111;
            background-image: url('fundo.jpg');
            background-size: 100% auto;
            background-repeat: no-repeat;
            background-position: top center;
            z-index: 1;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.9);
            overflow: hidden;
        }

        .dialogue-container {
            position: absolute;
            top: 10%; 
            left: 12%;
            width: 76%;
            height: 12%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: rotate(-6deg);
            z-index: 9999;
            pointer-events: none;
        }

        .dialogue-title {
            font-family: 'Permanent Marker', cursive;
            font-size: 24px;
            color: #ffffff !important;
            text-shadow: 3px 3px 6px rgba(230, 0, 18, 1);
            text-align: center;
            line-height: 1.1;
            text-transform: uppercase;
            width: 100%;
            word-wrap: break-word;
        }

        .spacer {
            width: 100%;
            padding-top: 130%; 
        }

        .content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            position: relative;
            z-index: 10;
        }

        .p5-panel {
            background: #e60012; 
            border: 4px solid #fff;
            padding: 15px;
            transform: skewX(-5deg);
            position: relative;
            box-shadow: 8px 8px 0px #000;
        }

        .p5-panel-inner {
            transform: skewX(5deg);
            text-align: center;
        }

        .p5-label {
            font-family: 'Anton', sans-serif;
            background: #000;
            color: #fff;
            display: inline-block;
            padding: 4px 12px;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            transform: rotate(-2deg);
        }

        .pix-key {
            background: #fff;
            color: #000;
            font-size: 16px;
            padding: 10px;
            border: 3px solid #000;
            word-break: break-all;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 10px;
        }

        .stat-box {
            background: #fff;
            border: 4px solid #000;
            padding: 15px 10px;
            position: relative;
            transform: skewX(3deg);
            box-shadow: -5px 5px 0px #e60012;
        }

        .stat-box.meta-box {
            background: #000;
            color: #fff;
            border-color: #fff;
            box-shadow: -5px 5px 0px #e60012;
        }

        .stat-box-inner {
            transform: skewX(-3deg);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-box .label {
            font-size: 12px;
            color: #e60012;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 5px;
            background: #000;
            padding: 2px 5px;
        }

        .stat-box.meta-box .label {
            color: #000;
            background: #fff;
        }

        .stat-box .value {
            font-size: 22px;
            letter-spacing: 1px;
        }

        .icon-joker {
            position: absolute;
            top: -45px;
            right: -25px;
            width: 80px;
            height: 80px;
            background-image: url('joker.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            z-index: 10;
        }

        .icon-frost {
            position: absolute;
            top: -45px;
            left: -20px;
            width: 75px;
            height: 75px;
            z-index: 10;
            background-image: url('jack_frost.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
        }

        .progress-wrapper {
            background: #000;
            border: 3px solid #fff;
            padding: 5px;
            transform: rotate(-1deg);
            position: relative;
        }

        .progress-bar-bg {
            background: #222;
            height: 30px;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            background: repeating-linear-gradient(
                -45deg,
                #e60012,
                #e60012 10px,
                #b3000e 10px,
                #b3000e 20px
            );
            height: 100%;
            width: 0%;
            transition: width 0.8s ease-in-out;
        }

        .progress-text {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
            text-shadow: 2px 2px 0 #000;
            z-index: 2;
        }

        /* --- ESTILO DA TABELA DE DOADORES (NOVA) --- */
        .leaderboard-wrapper {
            background: #111;
            border: 4px solid #fff;
            padding: 20px 15px;
            transform: skewX(-3deg);
            box-shadow: 8px 8px 0px #e60012;
            margin-top: 10px;
            margin-bottom: 30px;
            position: relative;
        }

        .leaderboard-header {
            font-family: 'Anton', sans-serif;
            background: #e60012;
            color: #fff;
            display: inline-block;
            padding: 6px 15px;
            font-size: 18px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transform: skewX(3deg) rotate(-2deg);
            margin-bottom: 15px;
            box-shadow: -4px 4px 0px #000;
            position: relative;
            left: -10px;
            top: -10px;
        }

        .leaderboard-list {
            list-style: none;
            padding: 0;
            transform: skewX(3deg); /* Desfaz a inclinação da caixa para o texto ficar legível */
        }

        .donor-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            color: #000;
            padding: 10px 12px;
            margin-bottom: 10px;
            border: 3px solid #000;
            font-family: 'Anton', sans-serif;
            font-size: 16px;
            text-transform: uppercase;
            box-shadow: -3px 3px 0px #e60012;
        }

        /* Destaque brutal para o Top 1 */
        .donor-item.top-1 {
            background: #e60012;
            color: #fff;
            border-color: #fff;
            transform: scale(1.05) rotate(1deg);
            margin-left: 5px;
            margin-right: 5px;
            margin-bottom: 15px;
            box-shadow: -4px 4px 0px #000;
            z-index: 2;
            position: relative;
        }

        .donor-rank {
            font-weight: bold;
            margin-right: 15px;
            font-size: 18px;
        }

        .donor-item.top-1 .donor-rank {
            color: #000;
            background: #fff;
            padding: 2px 8px;
            border-radius: 2px;
        }

        .donor-name {
            flex-grow: 1;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .donor-amount {
            color: #e60012;
            font-weight: bold;
        }

        .donor-item.top-1 .donor-amount {
            color: #fff;
        }
    </style>
</head>
<body>

<div class="bg-pc-blur"></div>

<div class="app-container">
    
    <div class="dialogue-container">
        <div class="dialogue-title" id="view-title">CARREGANDO...</div>
    </div>

    <div class="spacer"></div>

    <div class="content">
        <div class="p5-panel">
            <div class="p5-panel-inner">
                <div class="p5-label">CHAVE PIX</div>
                <div class="pix-key" id="view-pix">...</div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="icon-frost"></div>
                <div class="stat-box-inner">
                    <span class="label">ARRECADADO</span>
                    <span class="value" style="color: #000;" id="val-arrecadado">R$ 0,00</span>
                </div>
            </div>

            <div class="stat-box meta-box">
                <div class="icon-joker"></div>
                <div class="stat-box-inner">
                    <span class="label">META TOTAL</span>
                    <span class="value" id="val-meta">R$ 0,00</span>
                </div>
            </div>
        </div>

        <div class="progress-wrapper">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="bar-fill"></div>
                <div class="progress-text" id="bar-pct">0%</div>
            </div>
        </div>

        <div class="leaderboard-wrapper">
            <div class="leaderboard-header">TOP APOIADORES</div>
            <ul class="leaderboard-list" id="donor-list">
                </ul>
        </div>
    </div>
</div>

<script>
    localStorage.clear();

    function updateUI() {
        let campaign = {
            title: "Me ajude a comprar p5r (Persona 5 Royal)", 
            pix: "italogabriel25112007@gmail.com",             
            meta: 75.00,                                       
            arrecadado: 58.08                                  
        };

        // ==========================================
        // 🔴 ÁREA PARA VOCÊ EDITAR OS DOADORES 🔴
        // ==========================================
        // Basta adicionar um novo bloquinho de chaves {} com o "nome" e "valor" da pessoa.
        // Dica: Não precisa se preocupar com a ordem! O código vai colocar o maior valor no topo automaticamente.
        let donors = [
            { nome: "Arthur Gostoso", valor: 15.00 },
            { nome: "Lucas", valor: 13.00 },
            { nome: "Kainã", valor: 10.57 },
            { nome: "LucasF (Potato)", valor: 7.51 }
        ];
        // ==========================================

        // Atualiza os dados principais (Título, Pix, Valores)
        document.getElementById('view-title').innerText = campaign.title.toUpperCase();
        document.getElementById('view-pix').innerText = campaign.pix;
        document.getElementById('val-arrecadado').innerText = `R$ ${campaign.arrecadado.toFixed(2).replace('.', ',')}`;
        document.getElementById('val-meta').innerText = `R$ ${campaign.meta.toFixed(2).replace('.', ',')}`;

        // Barra de progresso
        let pct = Math.floor((campaign.arrecadado / campaign.meta) * 100);
        if (pct > 100) pct = 100;
        if (isNaN(pct)) pct = 0;
        document.getElementById('bar-fill').style.width = `${pct}%`;
        document.getElementById('bar-pct').innerText = `${pct}% CONCLUÍDO`;

        // Lógica da Tabela de Doadores
        const donorListElement = document.getElementById('donor-list');
        
        // 1. Organiza a lista do maior valor para o menor
        donors.sort((a, b) => b.valor - a.valor);

        // 2. Cria o visual para cada pessoa da lista
        let listaHTML = "";
        donors.forEach((donor, index) => {
            // Se for o primeiro da lista (index 0), adiciona a classe top-1 para dar destaque
            let destaque = (index === 0) ? "top-1" : "";
            
            listaHTML += `
                <li class="donor-item ${destaque}">
                    <span class="donor-rank">#${index + 1}</span>
                    <span class="donor-name">${donor.nome}</span>
                    <span class="donor-amount">R$ ${donor.valor.toFixed(2).replace('.', ',')}</span>
                </li>
            `;
        });

        // Se a lista estiver vazia, exibe uma mensagem legal
        if (donors.length === 0) {
            listaHTML = `<li class="donor-item" style="justify-content: center; color: #888;">NENHUM APOIADOR AINDA...</li>`;
        }

        // 3. Joga na tela
        donorListElement.innerHTML = listaHTML;
    }

    updateUI();
</script>
</body>
</html>
